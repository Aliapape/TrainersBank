<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بنك المدربين الرقمي</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .hero-section { background: #1A365D; color: white; padding: 60px 0; text-align: center; margin-bottom: 30px; }
        .card { border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-primary { background-color: #1A365D; border: none; }
        .btn-primary:hover { background-color: #2c5282; }
        .section-hidden { display: none; }
    </style>
</head>
<body>

    <div class="hero-section">
        <div class="container">
            <h1>منصة بنك المدربين الرقمي</h1>
            <p class="lead">المديرية العامة لإعداد المعلمين والتدريب والتطوير التربوي</p>
            <div class="mt-4">
                <button class="btn btn-outline-light me-2" onclick="showSection('loginSection')">تسجيل الدخول</button>
                <button class="btn btn-light" onclick="showSection('registerSection')">تسجيل جديد</button>
            </div>
        </div>
    </div>

    <div class="container mb-5">
        <div id="publicSection" class="card p-4 mb-4">
            <h3 class="mb-4">دليل المدربين المعتمدين</h3>
            <table class="table table-hover">
                <thead class="table-light">
                    <tr>
                        <th>الاسم</th>
                        <th>التخصص</th>
                        <th>الحالة</th>
                    </tr>
                </thead>
                <tbody id="trainersList">
                    </tbody>
            </table>
        </div>

        <div id="loginSection" class="card p-4 section-hidden shadow-lg">
            <h3>تسجيل الدخول</h3>
            <div class="mb-3">
                <label>البريد الإلكتروني</label>
                <input type="email" id="loginEmail" class="form-control">
            </div>
            <div class="mb-3">
                <label>كلمة المرور</label>
                <input type="password" id="loginPass" class="form-control">
            </div>
            <button class="btn btn-primary w-100" onclick="handleLogin()">دخول</button>
            <button class="btn btn-link w-100 mt-2" onclick="showSection('publicSection')">عودة للرئيسية</button>
        </div>

        <div id="registerSection" class="card p-4 section-hidden">
            <h3>إنشاء حساب مدرب جديد</h3>
            <div class="row g-3">
                <div class="col-md-6"><input type="text" id="regName" class="form-control" placeholder="الاسم الكامل"></div>
                <div class="col-md-6"><input type="email" id="regEmail" class="form-control" placeholder="البريد الإلكتروني"></div>
                <div class="col-md-6"><input type="password" id="regPass" class="form-control" placeholder="كلمة المرور"></div>
                <div class="col-md-6"><input type="text" id="regSpec" class="form-control" placeholder="التخصص الدقيق"></div>
                <div class="col-md-12"><input type="text" id="regPhone" class="form-control" placeholder="رقم الواتساب"></div>
            </div>
            <button class="btn btn-success mt-3 w-100" onclick="handleRegister()">إرسال البيانات</button>
            <button class="btn btn-link w-100 mt-2" onclick="showSection('publicSection')">إلغاء</button>
        </div>
    </div>

    <script>
        // ضع رابط الـ API الخاص بك هنا
        const API_URL = "https://script.google.com/macros/s/AKfycbyi8Xk_bv3KEXQ4_Mv9GZnmkXifdXfubMOFQkbJ16vgbXmD_TCmgXYNGrwioyDO5TJrOg/exec";

        function showSection(id) {
            document.querySelectorAll('.card').forEach(c => c.classList.add('section-hidden'));
            document.getElementById(id).classList.remove('section-hidden');
            if(id === 'publicSection') loadPublicTrainers();
        }

        // جلب البيانات العامة
        async function loadPublicTrainers() {
            const res = await fetch(API_URL + "?action=getPublicTrainers");
            const data = await res.json();
            let html = "";
            data.forEach(t => {
                html += `<tr><td>${t.name}</td><td>${t.spec}</td><td><span class="badge bg-success">معتمد</span></td></tr>`;
            });
            document.getElementById('trainersList').innerHTML = html || "<tr><td colspan='3'>لا يوجد مدربين مسجلين بعد</td></tr>";
        }

        // معالجة التسجيل
        async function handleRegister() {
            const payload = {
                action: "register",
                full_name: document.getElementById('regName').value,
                email: document.getElementById('regEmail').value,
                password: document.getElementById('regPass').value,
                specialization: document.getElementById('regSpec').value,
                whatsapp: document.getElementById('regPhone').value
            };
            const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
            const result = await res.json();
            if(result.result === "success") { alert("تم التسجيل بنجاح! يمكنك الدخول الآن."); showSection('loginSection'); }
        }

        // معالجة الدخول
        async function handleLogin() {
            const payload = {
                action: "login",
                email: document.getElementById('loginEmail').value,
                password: document.getElementById('loginPass').value
            };
            const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
            const result = await res.json();
            if(result.result === "success") {
                alert("مرحباً بك " + result.user.name);
                // هنا يمكن توجيه المدرب للوحة التحكم الخاصة به
            } else {
                alert("خطأ: " + result.message);
            }
        }

        // تشغيل الجلب التلقائي عند الفتح
        loadPublicTrainers();
    </script>
</body>
</html>
