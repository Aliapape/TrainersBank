<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>بنك المدربين</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">

<style>

body{
background:#f3f5f7;
font-family:Tahoma;
}

.hero{
background:#1A365D;
color:white;
padding:30px;
text-align:center;
}

.section-hidden{
display:none;
}

.card{
border-radius:12px;
margin-bottom:20px;
}

</style>

</head>


<body>

<div class="hero">

<h3 id="welcomeTitle">منصة بنك المدربين</h3>

<button id="logoutBtn" class="btn btn-danger btn-sm section-hidden" onclick="logout()">تسجيل خروج</button>

</div>


<div class="container mt-4">

<div id="msgBox"></div>


<div id="publicSection" class="card p-4">

<div class="d-flex justify-content-between mb-3">

<h4>دليل المدربين</h4>

<div>

<button class="btn btn-primary" onclick="showSection('loginSection')">دخول</button>

<button class="btn btn-success" onclick="showSection('registerSection')">تسجيل</button>

</div>

</div>


<input class="form-control mb-3" placeholder="بحث..." onkeyup="searchTrainer(this.value)">


<table class="table">

<thead>

<tr>

<th>الاسم</th>
<th>التخصص</th>

</tr>

</thead>

<tbody id="trainersList"></tbody>

</table>

</div>



<div id="loginSection" class="card p-4 section-hidden">

<h4 class="mb-3">تسجيل الدخول</h4>

<input id="loginEmail" class="form-control mb-2" placeholder="البريد الإلكتروني">

<input id="loginPass" type="password" class="form-control mb-3" placeholder="كلمة المرور">

<button class="btn btn-primary w-100" onclick="handleLogin()">دخول</button>

<button class="btn btn-link w-100" onclick="showSection('publicSection')">رجوع</button>

</div>



<div id="registerSection" class="card p-4 section-hidden">

<h4 class="mb-3">تسجيل مدرب جديد</h4>

<input id="regName" class="form-control mb-2" placeholder="الاسم الكامل">

<input id="regEmail" class="form-control mb-2" placeholder="البريد الإلكتروني">

<input id="regPass" type="password" class="form-control mb-2" placeholder="كلمة المرور">

<input id="regSpec" class="form-control mb-2" placeholder="التخصص">

<input id="regPhone" class="form-control mb-3" placeholder="رقم الواتساب">

<button class="btn btn-success w-100" onclick="handleRegister()">تسجيل</button>

<button class="btn btn-link w-100" onclick="showSection('publicSection')">رجوع</button>

</div>



<div id="dashboardSection" class="section-hidden">

<div class="card p-4">

<h5>الملف الشخصي</h5>

<input id="upName" class="form-control mb-2" placeholder="الاسم">

<input id="upPhone" class="form-control mb-2" placeholder="واتساب">

<input id="upDegree" class="form-control mb-2" placeholder="الشهادة">

<input id="upTitle" class="form-control mb-2" placeholder="اللقب العلمي">

<input id="upSpec" class="form-control mb-2" placeholder="التخصص">

<input id="upEmail" class="form-control mb-2" placeholder="البريد">

<input id="upPass" class="form-control mb-3" placeholder="كلمة مرور جديدة">

<button class="btn btn-primary" onclick="updateProfile()">حفظ التعديل</button>

</div>


<div class="card p-4">

<h5>إضافة نشاط تدريبي</h5>

<input id="actName" class="form-control mb-2" placeholder="اسم النشاط">

<select id="actType" class="form-control mb-2">

<option>دورة</option>
<option>ورشة</option>

</select>

<input id="actRating" class="form-control mb-2" placeholder="التقييم">

<input id="actLink" class="form-control mb-3" placeholder="رابط المرفق">

<button class="btn btn-success" onclick="addActivity()">إضافة النشاط</button>

</div>

</div>

</div>



<script>

const API_URL="https://script.google.com/macros/s/AKfycbyi8Xk_bv3KEXQ4_Mv9GZnmkXifdXfubMOFQkbJ16vgbXmD_TCmgXYNGrwioyDO5TJrOg/exec";

let currentUser=null;



function showMessage(text,type="success"){

document.getElementById("msgBox").innerHTML=

`<div class="alert alert-${type}">${text}</div>`

setTimeout(()=>{

document.getElementById("msgBox").innerHTML=""

},4000)

}



function showSection(id){

document.querySelectorAll(".card,#dashboardSection")
.forEach(e=>e.classList.add("section-hidden"))

document.getElementById(id).classList.remove("section-hidden")

}



async function loadPublicTrainers(){

const res=await fetch(API_URL+"?action=getPublicTrainers")

const data=await res.json()

let html=data.map(t=>`

<tr>

<td>${t.name}</td>

<td>${t.spec}</td>

</tr>

`).join("")

document.getElementById("trainersList").innerHTML=html

}



function searchTrainer(text){

document.querySelectorAll("#trainersList tr")
.forEach(r=>{

r.style.display=r.innerText.includes(text)?"":"none"

})

}



async function handleRegister(){

const payload={

action:"register",

full_name:regName.value,

email:regEmail.value,

password:regPass.value,

specialization:regSpec.value,

whatsapp:regPhone.value

}

const res=await fetch(API_URL,{

method:"POST",

headers:{'Content-Type':'application/json'},

body:JSON.stringify(payload)

})

const result=await res.json()

if(result.result==="email_exists"){

showMessage("البريد مستخدم مسبقاً","danger")

return

}

showMessage("تم التسجيل بنجاح")

showSection("loginSection")

}



async function handleLogin(){

const email=loginEmail.value

const pass=loginPass.value

const res=await fetch(API_URL+"?action=login")

const users=await res.json()

const user=users.find(u=>u.email===email && u.pass===pass)

if(!user){

showMessage("البيانات غير صحيحة","danger")

return

}

if(user.status!=1){

showMessage("الحساب بانتظار الموافقة","warning")

return

}

currentUser=user

localStorage.setItem("trainer",JSON.stringify(user))

fillProfile()

showSection("dashboardSection")

logoutBtn.classList.remove("section-hidden")

welcomeTitle.innerText="مرحبا "+user.name

}



function fillProfile(){

upName.value=currentUser.name

upPhone.value=currentUser.phone

upDegree.value=currentUser.degree

upTitle.value=currentUser.title

upSpec.value=currentUser.spec

upEmail.value=currentUser.email

}



async function updateProfile(){

const payload={

action:"updateProfile",

userId:currentUser.userId,

name:upName.value,

phone:upPhone.value,

degree:upDegree.value,

title:upTitle.value,

spec:upSpec.value,

email:upEmail.value,

pass:upPass.value

}

await fetch(API_URL,{

method:"POST",

body:JSON.stringify(payload)

})

showMessage("تم التحديث")

}



async function addActivity(){

const payload={

action:"addActivity",

userId:currentUser.userId,

name:actName.value,

type:actType.value,

rating:actRating.value,

link:actLink.value

}

await fetch(API_URL,{

method:"POST",

body:JSON.stringify(payload)

})

showMessage("تمت إضافة النشاط")

}



function logout(){

localStorage.removeItem("trainer")

location.reload()

}



window.onload=function(){

loadPublicTrainers()

const saved=localStorage.getItem("trainer")

if(saved){

currentUser=JSON.parse(saved)

fillProfile()

showSection("dashboardSection")

logoutBtn.classList.remove("section-hidden")

}

}

</script>

</body>

</html>
